<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Boost — Тест</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #16213e;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 { color: #ff6b6b; font-size: 24px; margin-bottom: 8px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .btn-primary {
            background: #ff6b6b;
            color: white;
        }
        .btn-primary:hover { transform: scale(1.02); background: #ff4757; }
        .btn-secondary {
            background: #444;
            color: white;
        }
        .btn-secondary:hover { background: #555; }
        .status {
            margin: 12px 0;
            padding: 10px;
            border-radius: 8px;
            background: #0f3460;
            color: #ffd93d;
            font-size: 13px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .log {
            background: #0a0a1a;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #7ec8e3;
            margin-top: 12px;
            text-align: left;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Xray Boost</h1>
        <p>Тестовая версия Mini App</p>
        
        <button class="btn btn-primary" onclick="test()">📡 Отправить тест</button>
        <button class="btn btn-primary" onclick="purchaseTest()">🛒 Тест покупки</button>
        <button class="btn btn-secondary" onclick="closeApp()">❌ Закрыть</button>
        
        <div class="status" id="status">⏳ Готов</div>
        <div class="log" id="log">📋 Лог:</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || 0;
        addLog('User ID: ' + userId);

        function test() {
            addLog('⏳ Отправка теста...');
            setStatus('⏳ Отправка...');
            
            tg.sendData(JSON.stringify({
                action: 'test',
                user_id: userId,
                timestamp: Date.now()
            }));
            
            setTimeout(() => {
                setStatus('✅ Тест отправлен, жди ответ в боте');
            }, 1000);
        }

        function purchaseTest() {
            addLog('⏳ Отправка тестовой покупки...');
            setStatus('⏳ Отправка...');
            
            tg.sendData(JSON.stringify({
                action: 'purchase',
                invite: 'https://discord.gg/test',
                qty: 2,
                total: 42,
                user_id: userId
            }));
            
            setTimeout(() => {
                setStatus('✅ Запрос отправлен, жди ответ в боте');
            }, 1000);
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function addLog(text) {
            const log = document.getElementById('log');
            log.innerHTML += '\n' + new Date().toLocaleTimeString() + ' | ' + text;
            log.scrollTop = log.scrollHeight;
        }

        function closeApp() {
            tg.close();
        }

        // Автоматический тест при загрузке
        setTimeout(() => {
            test();
        }, 2000);
    </script>
</body>
</html>
