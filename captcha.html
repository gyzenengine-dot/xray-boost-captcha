<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Boost — Капча</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #16213e;
            padding: 20px;
            border-radius: 16px;
        }
        h1 { color: #ff6b6b; }
        .btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 5px;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-secondary { background: #444; }
        .status { 
            margin: 15px 0; 
            padding: 10px; 
            background: #0f3460; 
            border-radius: 8px; 
            color: #ffd93d; 
        }
        .status.success { color: #2ecc71; }
        .iframe-container {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 8px;
            margin: 10px 0;
            background: #0a0a1a;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Реши капчу</h1>
        <p>Discord требует капчу для этого аккаунта.</p>
        
        <div class="iframe-container">
            <iframe id="discordFrame" src="https://discord.com/channels/@me"></iframe>
        </div>
        
        <div class="status" id="status">⏳ Реши капчу в окне выше</div>
        
        <button class="btn" onclick="captchaSolved()">✅ Я решил капчу</button>
        <button class="btn btn-secondary" onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function captchaSolved() {
            document.getElementById('status').textContent = '⏳ Отправляю сигнал боту...';
            
            tg.sendData(JSON.stringify({
                action: 'captcha_solved'
            }));
            
            setTimeout(() => {
                document.getElementById('status').textContent = '✅ Сигнал отправлен! Закрой это окно.';
                document.getElementById('status').className = 'status success';
                setTimeout(() => {
                    tg.close();
                }, 2000);
            }, 1000);
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
