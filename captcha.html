<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Boost — Капча</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #16213e;
            padding: 20px;
            border-radius: 16px;
        }
        h1 { color: #ff6b6b; }
        .btn {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 5px;
            text-decoration: none;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-secondary { background: #444; }
        .btn-discord {
            background: #7289da;
        }
        .btn-discord:hover { background: #5b6eae; }
        .status { 
            margin: 15px 0; 
            padding: 10px; 
            background: #0f3460; 
            border-radius: 8px; 
            color: #ffd93d; 
        }
        .status.success { color: #2ecc71; }
        .steps {
            text-align: left;
            background: #1a1a40;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .steps li { margin: 8px 0; color: #ccc; }
        .link-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
        }
        .link-box a {
            color: #7ec8e3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Реши капчу</h1>
        <p>Discord требует капчу для этого аккаунта.</p>
        
        <div class="steps">
            <ol>
                <li>Нажми «Открыть Discord»</li>
                <li>Войди в аккаунт и реши капчу</li>
                <li>Вернись сюда и нажми «✅ Я решил капчу»</li>
            </ol>
        </div>
        
        <div class="link-box">
            🔗 <a href="https://discord.com/login" target="_blank">Открыть Discord для входа</a>
        </div>
        
        <div class="status" id="status">⏳ Ожидание...</div>
        
        <button class="btn btn-discord" onclick="openDiscord()">🚀 Открыть Discord</button>
        <br><br>
        <button class="btn" onclick="captchaSolved()">✅ Я решил капчу</button>
        <button class="btn btn-secondary" onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function openDiscord() {
            window.open('https://discord.com/login', '_blank');
        }

        function captchaSolved() {
            document.getElementById('status').textContent = '⏳ Отправляю сигнал боту...';
            
            tg.sendData(JSON.stringify({
                action: 'captcha_solved'
            }));
            
            setTimeout(() => {
                document.getElementById('status').textContent = '✅ Сигнал отправлен! Закрой это окно.';
                document.getElementById('status').className = 'status success';
                setTimeout(() => {
                    tg.close();
                }, 2000);
            }, 1000);
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
