<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Boost — Капча</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #16213e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 24px;
            color: #ff6b6b;
        }
        p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn:hover {
            background: #ff4757;
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            background: #444;
        }
        .btn-secondary:hover {
            background: #555;
        }
        .link-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
            font-size: 12px;
        }
        .link-box a {
            color: #7ec8e3;
        }
        .steps {
            text-align: left;
            background: #1a1a40;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .steps li {
            margin: 8px 0;
            color: #ccc;
        }
        .status {
            margin: 15px 0;
            padding: 10px;
            background: #0f3460;
            border-radius: 8px;
            font-size: 14px;
            color: #ffd93d;
        }
        .status.success {
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Реши капчу</h1>
        <p>Discord требует капчу для этого аккаунта.</p>
        
        <div class="steps">
            <ol>
                <li>Открой Discord в браузере</li>
                <li>Войди в аккаунт и реши капчу</li>
                <li>Вернись сюда и нажми кнопку</li>
            </ol>
        </div>
        
        <div class="link-box">
            🔗 <a href="https://discord.com/login" target="_blank">Открыть Discord для входа</a>
        </div>
        
        <div class="status" id="status">⏳ Ожидание...</div>
        
        <button class="btn" onclick="captchaSolved()">✅ Я решил капчу</button>
        <br><br>
        <button class="btn btn-secondary" onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function captchaSolved() {
            document.getElementById('status').textContent = '✅ Отправляю сигнал боту...';
            document.getElementById('status').className = 'status success';
            
            tg.sendData(JSON.stringify({
                action: 'captcha_solved',
                user_id: tg.initDataUnsafe?.user?.id || 'unknown'
            }));
            
            setTimeout(() => {
                document.getElementById('status').textContent = '✅ Капча решена! Можешь закрыть это окно.';
            }, 2000);
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
