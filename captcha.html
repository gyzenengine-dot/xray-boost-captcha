<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Boost — Покупка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #16213e;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 {
            color: #ff6b6b;
            font-size: 24px;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #aaa;
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .balance-box {
            background: #0f3460;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .balance-box .label { color: #aaa; }
        .balance-box .value { color: #2ecc71; font-weight: bold; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #0a0a1a;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        .form-group input::placeholder {
            color: #555;
        }
        .price-info {
            background: #0f3460;
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .price-info .label { color: #aaa; }
        .price-info .value { color: #ffd93d; font-weight: bold; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .btn-primary {
            background: #ff6b6b;
            color: white;
        }
        .btn-primary:hover { transform: scale(1.02); background: #ff4757; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #444;
            color: white;
        }
        .btn-secondary:hover { background: #555; }
        .status {
            margin: 12px 0;
            padding: 10px;
            border-radius: 8px;
            background: #0f3460;
            color: #ffd93d;
            font-size: 13px;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status.success { color: #2ecc71; }
        .status.error { color: #ff6b6b; }
        .hidden { display: none; }
        .captcha-section {
            margin-top: 12px;
            padding: 12px;
            background: #0a0a1a;
            border-radius: 8px;
            border: 1px solid #ff6b6b;
            display: none;
        }
        .captcha-section .btn-discord {
            background: #5865f2;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .captcha-section .btn-discord:hover { background: #4752c4; }
        .captcha-section .btn {
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Xray Boost</h1>
        <p class="subtitle">Примени буст на свой сервер</p>
        
        <div class="balance-box">
            <span class="label">💰 Твой баланс</span>
            <span class="value" id="balanceDisplay">0 ₽</span>
        </div>
        
        <div class="form-group">
            <label>🔗 Ссылка-приглашение на сервер</label>
            <input type="text" id="inviteInput" placeholder="https://discord.gg/yourlink" value="">
        </div>
        
        <div class="form-group">
            <label>📊 Количество бустов (чётное)</label>
            <input type="number" id="qtyInput" placeholder="2, 4, 6..." value="2" min="2" step="2">
        </div>
        
        <div class="price-info">
            <span class="label">💲 Цена за буст</span>
            <span class="value" id="pricePerBoost">21 ₽</span>
        </div>
        <div class="price-info">
            <span class="label">💰 Итого</span>
            <span class="value" id="totalPrice">42 ₽</span>
        </div>
        
        <div class="status" id="status">⏳ Готов к покупке</div>
        
        <button class="btn btn-primary" id="buyBtn" onclick="startPurchase()">✅ Применить буст</button>
        <button class="btn btn-secondary" onclick="closeApp()">❌ Закрыть</button>
        
        <div class="captcha-section" id="captchaSection">
            <p style="color: #ff6b6b; font-size: 14px;">🧩 Требуется капча!</p>
            <p style="font-size: 13px; color: #aaa;">Открой Discord в браузере и реши капчу, затем вернись и нажми кнопку.</p>
            <a href="https://discord.com/login" target="_blank" rel="noopener noreferrer" class="btn-discord">🚀 Открыть Discord</a>
            <button class="btn btn-primary" onclick="captchaSolved()">✅ Я решил капчу</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const PRICE_PER_BOOST = 21;
        let balance = 0;
        let userId = 0;

        // Получаем данные от бота
        try {
            let initData = tg.initDataUnsafe || {};
            userId = initData.user?.id || 0;
            let startParam = initData.start_param || '';
            
            if (startParam) {
                try {
                    let params = JSON.parse(decodeURIComponent(startParam));
                    balance = params.balance || 0;
                } catch (e) {
                    console.log('Error parsing start_param');
                }
            }
            document.getElementById('balanceDisplay').textContent = balance + ' ₽';
        } catch (e) {
            console.log('No init data');
        }

        // Обновление цены при изменении количества
        document.getElementById('qtyInput').addEventListener('input', function() {
            let qty = parseInt(this.value) || 0;
            if (qty < 2) qty = 2;
            if (qty % 2 !== 0) qty = Math.floor(qty / 2) * 2;
            this.value = qty;
            let total = qty * PRICE_PER_BOOST;
            document.getElementById('totalPrice').textContent = total + ' ₽';
        });
        document.getElementById('qtyInput').dispatchEvent(new Event('input'));

        function startPurchase() {
            let invite = document.getElementById('inviteInput').value.trim();
            let qty = parseInt(document.getElementById('qtyInput').value) || 2;
            
            if (!invite) {
                setStatus('❌ Введите ссылку-приглашение', 'error');
                return;
            }
            if (!invite.includes('discord.gg/') && !invite.includes('discord.com/invite/')) {
                setStatus('❌ Неверный формат ссылки', 'error');
                return;
            }
            if (qty < 2 || qty % 2 !== 0) {
                setStatus('❌ Количество должно быть чётным (2, 4, 6...)', 'error');
                return;
            }
            
            let total = qty * PRICE_PER_BOOST;
            if (total > balance) {
                setStatus(`❌ Недостаточно средств! Нужно ${total} ₽`, 'error');
                return;
            }
            
            setStatus('⏳ Отправляю запрос боту...', '');
            document.getElementById('buyBtn').disabled = true;
            
            // Отправляем данные боту
            tg.sendData(JSON.stringify({
                action: 'purchase',
                invite: invite,
                qty: qty,
                total: total,
                user_id: userId
            }));
        }

        function captchaSolved() {
            setStatus('⏳ Отправляю сигнал боту...', '');
            tg.sendData(JSON.stringify({
                action: 'captcha_solved',
                user_id: userId
            }));
            document.getElementById('captchaSection').style.display = 'none';
        }

        function setStatus(text, type) {
            let el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status' + (type ? ' ' + type : '');
        }

        function showCaptcha() {
            document.getElementById('captchaSection').style.display = 'block';
            setStatus('🧩 Реши капчу и нажми кнопку', '');
            document.getElementById('buyBtn').disabled = false;
        }

        function closeApp() {
            tg.close();
        }

        // Обработка ответов от бота через tg.sendData
        // Бот может ответить через callback или сообщение
    </script>
</body>
</html>
