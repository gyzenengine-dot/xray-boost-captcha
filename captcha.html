<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Boost — Капча</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #16213e;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }
        h1 {
            color: #ff6b6b;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .btn-primary {
            background: #ff6b6b;
            color: white;
        }
        .btn-primary:hover { transform: scale(1.02); background: #ff4757; }
        .btn-secondary {
            background: #444;
            color: white;
        }
        .btn-secondary:hover { background: #555; }
        .btn-discord {
            background: #5865f2;
            color: white;
        }
        .btn-discord:hover { background: #4752c4; }
        .status {
            margin: 12px 0;
            padding: 10px;
            border-radius: 8px;
            background: #0f3460;
            color: #ffd93d;
            font-size: 13px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .steps {
            text-align: left;
            background: #1a1a40;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .steps li { margin: 8px 0; color: #ccc; }
        .link-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
        }
        .link-box a {
            color: #7ec8e3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Реши капчу</h1>
        <p>Discord требует капчу для этого аккаунта.</p>
        
        <div class="steps">
            <ol>
                <li>Нажми «Открыть Discord»</li>
                <li>Войди в аккаунт и реши капчу</li>
                <li>Вернись и нажми «✅ Готово»</li>
            </ol>
        </div>
        
        <div class="link-box">
            🔗 <a href="https://discord.com/login" target="_blank">Открыть Discord для входа</a>
        </div>
        
        <a href="https://discord.com/login" target="_blank" class="btn btn-discord">🚀 Открыть Discord</a>
        
        <div class="status" id="status">⏳ Ожидание...</div>
        
        <button class="btn btn-primary" onclick="captchaSolved()">✅ Готово, капча решена</button>
        <button class="btn btn-secondary" onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function captchaSolved() {
            document.getElementById('status').textContent = '⏳ Отправляю сигнал боту...';
            
            tg.sendData(JSON.stringify({
                action: 'captcha_solved'
            }));
            
            setTimeout(() => {
                document.getElementById('status').textContent = '✅ Сигнал отправлен! Закрой это окно.';
                setTimeout(() => {
                    tg.close();
                }, 2000);
            }, 1000);
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
